name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Binaries
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: |
          set -euxo pipefail
          mkdir -p dist/root
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.appVersion=${VERSION} -X main.gitCommit=${COMMIT} -X main.buildTime=${BUILD_TIME}" \
            -o dist/root/hubfly-reverse-proxy ./cmd/hubfly

      - name: Prepare Package
        run: |
          set -euxo pipefail
          cp -r nginx dist/root/nginx
          cp -r templates dist/root/templates
          cp -r static dist/root/static
          mkdir -p dist/root/data/http dist/root/data/tcp dist/root/logs/runtime dist/root/logs/nginx dist/root/certbot/{config,work,logs}
          cd dist/root
          zip -r ../hubfly-linux-amd64.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hubfly-linux-amd64.zip
