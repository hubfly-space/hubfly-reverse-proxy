<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>403 Forbidden</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap");
            :root {
                --bg: #faf7f4;
                --brand: #7e604f;
                --text: #262326;
                --muted: #6f6a67;
                --line: rgba(126, 96, 79, 0.08);
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Inter", sans-serif;
                background-color: var(--bg);
                background-image:
                    linear-gradient(var(--line) 1px, transparent 1px),
                    linear-gradient(90deg, var(--line) 1px, transparent 1px);
                background-size: 50px 50px;
                color: var(--text);
                overflow: hidden;
            }
            .error-wrap {
                text-align: center;
                position: relative;
                transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
                cursor: default;
            }
            .error-wrap:hover {
                transform: scale(1.05);
            }
            /* Soft glow behind the numbers */
            .error-wrap::before {
                content: "";
                position: absolute;
                top: 50%;
                left: 50%;
                width: 120%;
                height: 80%;
                background: radial-gradient(
                    circle,
                    rgba(126, 96, 79, 0.1) 0%,
                    transparent 70%
                );
                transform: translate(-50%, -50%);
                z-index: -1;
            }
            .code {
                font-size: clamp(8rem, 25vw, 16rem);
                font-weight: 900;
                line-height: 0.9;
                margin: 0;
                letter-spacing: -0.06em;
                background: linear-gradient(
                    180deg,
                    var(--brand) 20%,
                    var(--text) 100%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.05));
            }
            .message {
                margin-top: -20px; /* Pull text closer to the code */
            }
            h1 {
                font-size: clamp(1rem, 3vw, 1.5rem);
                font-weight: 700;
                margin: 0;
                text-transform: uppercase;
                letter-spacing: 0.6em;
                color: var(--brand);
                opacity: 0.9;
            }
            p {
                margin-top: 8px;
                font-size: 0.9rem;
                color: var(--muted);
                letter-spacing: 0.02em;
            }
            .back-link {
                display: inline-block;
                margin-top: 30px;
                padding: 10px 24px;
                font-size: 0.8rem;
                font-weight: 700;
                text-transform: uppercase;
                text-decoration: none;
                color: var(--brand);
                border: 1px solid var(--brand);
                border-radius: 4px;
                transition: all 0.3s ease;
                letter-spacing: 0.1em;
            }
            .back-link:hover {
                background: var(--brand);
                color: var(--bg);
            }
            /* Subtle floating animation */
            .container-anim {
                animation: float 5s ease-in-out infinite;
            }
            @keyframes float {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-15px);
                }
            }
        </style>
    </head>
    <body>
        <main class="container-anim">
            <div class="error-wrap">
                <div class="code">403</div>
                <div class="message">
                    <h1>Forbidden</h1>
                    <p>You don't have permission to be here.</p>
                </div>
            </div>
        </main>
    </body>
</html>
