<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Error - Page Not Found</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap");
            :root {
                --bg: #faf7f4;
                --brand: #7e604f;
                --text: #262326;
                --muted: #6f6a67;
                --line: rgba(126, 96, 79, 0.08);
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Inter", sans-serif;
                background-color: var(--bg);
                /* Animated Grid Background */
                background-image:
                    linear-gradient(var(--line) 1px, transparent 1px),
                    linear-gradient(90deg, var(--line) 1px, transparent 1px);
                background-size: 60px 60px;
                color: var(--text);
                overflow: hidden;
                animation: grid-pulse 10s ease-in-out infinite;
            }

            @keyframes grid-pulse {
                0%,
                100% {
                    background-position: 0 0;
                }
                50% {
                    background-position: 10px 10px;
                }
            }

            .error-wrap {
                text-align: center;
                position: relative;
                animation: float 6s ease-in-out infinite;
            }

            /* The large status number */
            .code {
                font-size: clamp(8rem, 28vw, 18rem);
                font-weight: 900;
                line-height: 0.85;
                margin: 0;
                letter-spacing: -0.07em;
                background: linear-gradient(
                    180deg,
                    var(--brand) 10%,
                    var(--text) 90%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.04));
                user-select: none;
            }

            .message-box {
                margin-top: -15px;
            }

            h1 {
                font-size: clamp(1rem, 4vw, 1.4rem);
                font-weight: 700;
                margin: 0;
                text-transform: uppercase;
                letter-spacing: 0.5em;
                color: var(--brand);
            }

            p {
                margin-top: 10px;
                font-size: 0.95rem;
                color: var(--muted);
                letter-spacing: 0.01em;
                max-width: 300px;
                margin-left: auto;
                margin-right: auto;
            }

            @keyframes float {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-12px);
                }
            }

            /* Responsive tweaks */
            @media (max-width: 480px) {
                h1 {
                    letter-spacing: 0.3em;
                }
            }
        </style>
    </head>
    <body>
        <main class="error-wrap">
            <div class="code">404</div>
            <div class="message-box">
                <h1>Not Found</h1>
                <p>The page you are looking for has vanished into the grid.</p>
            </div>
        </main>
    </body>
</html>
